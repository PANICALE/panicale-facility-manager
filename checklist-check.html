<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>점검하기 - 시설관리</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PANICALE 시설관리">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<main class="container">
    <h1>점검하기</h1>
    <p class="meta-line" id="itemMeta">불러오는 중...</p>

    <form id="checkForm" class="form-box">
        <label>결과</label>
        <select name="status">
            <option value="OK">정상</option>
            <option value="ISSUE">이상발견</option>
        </select>
        <label>점검일 (비워두면 오늘 날짜로 기록)</label>
        <input type="date" name="checked_at">
        <label>메모</label>
        <input type="text" name="memo" placeholder="메모 (선택)">
        <button type="submit" class="btn btn-primary">기록</button>
    </form>
    <p style="margin-top:14px;"><a href="dashboard.html" class="btn">← 대시보드로 돌아가기</a></p>
</main>

<script src="js/lib.js"></script>
<script src="js/nav.js"></script>
<script>
const itemId = new URLSearchParams(location.search).get("item_id");

(async () => {
    const session = await requireAuth();
    if (!session) return;
    renderNavbar();

    const { data: item, error } = await sb
        .from("checklist_items")
        .select("id, item_name, equipment(name)")
        .eq("id", itemId)
        .single();

    if (error || !item) { document.getElementById("itemMeta").textContent = "항목을 찾을 수 없습니다."; return; }
    document.getElementById("itemMeta").textContent = `${item.equipment.name} - ${item.item_name}`;
})();

document.getElementById("checkForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const status = form.status.value;
    const memo = form.memo.value.trim();
    const checkedAtInput = form.checked_at.value;
    const checkedAt = checkedAtInput ? `${checkedAtInput}T00:00:00+09:00` : new Date().toISOString();

    const session = await requireAuth();
    const { error } = await sb.from("inspection_records").insert({
        checklist_item_id: itemId,
        checked_by: session.user.email,
        checked_at: checkedAt,
        status, memo,
    });

    if (error) { alert("저장 실패: " + error.message); return; }

    // 이상발견이면 이슈 자동 등록
    if (status === "ISSUE") {
        const { data: item } = await sb.from("checklist_items").select("equipment_id, item_name").eq("id", itemId).single();
        if (item) {
            await sb.from("issues").insert({
                equipment_id: item.equipment_id,
                title: `[점검 이상] ${item.item_name}`,
                description: memo || "점검 중 이상 발견",
                severity: "MEDIUM",
                reported_by: session.user.email,
                occurred_at: checkedAtInput || todayStr(),
            });
        }
    }
    window.location.href = "dashboard.html";
});
</script>
</body>
</html>
