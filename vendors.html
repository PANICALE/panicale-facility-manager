<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리업체 - 시설관리</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PANICALE 시설관리">
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<main class="container">
    <div class="page-header">
        <h1>관리업체 연락처</h1>
        <button class="btn btn-primary" id="addBtn">+ 업체 등록</button>
    </div>

    <form id="addForm" class="form-box" style="display:none;">
        <label>업체명 *</label><input type="text" name="name" required>
        <label>분야</label><input type="text" name="category" placeholder="예: 냉각설비 A/S">
        <label>담당자</label><input type="text" name="contact_person">
        <label>연락처</label><input type="text" name="phone" placeholder="010-1234-5678">
        <label>비고</label><textarea name="notes" rows="2"></textarea>
        <button type="submit" class="btn btn-primary">저장</button>
    </form>

    <div class="table-wrap">
    <table class="data-table">
        <thead><tr><th>업체명</th><th>분야</th><th>담당자</th><th>연락처</th><th>비고</th><th></th></tr></thead>
        <tbody id="listBody"><tr><td colspan="6">불러오는 중...</td></tr></tbody>
    </table>
    </div>
</main>

<script src="js/lib.js"></script>
<script src="js/nav.js"></script>
<script>
(async () => {
    const session = await requireAuth();
    if (!session) return;
    renderNavbar();
    await loadList();
})();

document.getElementById("addBtn").addEventListener("click", () => {
    document.getElementById("addForm").style.display = "block";
});

document.getElementById("addForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const f = e.target;
    const { error } = await sb.from("vendors").insert({
        name: f.name.value.trim(), category: f.category.value.trim(),
        contact_person: f.contact_person.value.trim(), phone: f.phone.value.trim(),
        notes: f.notes.value.trim(),
    });
    if (error) { alert("등록 실패: " + error.message); return; }
    f.reset(); f.style.display = "none";
    await loadList();
});

async function loadList() {
    const { data, error } = await sb.from("vendors").select("*").eq("is_active", true).order("category").order("name");
    if (error) { alert(error.message); return; }
    const tbody = document.getElementById("listBody");
    if (data.length === 0) { tbody.innerHTML = `<tr><td colspan="6">등록된 업체가 없습니다.</td></tr>`; return; }
    tbody.innerHTML = data.map(v => `
        <tr>
            <td>${escapeHtml(v.name)}</td>
            <td>${escapeHtml(v.category) || "-"}</td>
            <td>${escapeHtml(v.contact_person) || "-"}</td>
            <td>${v.phone ? `<a href="tel:${escapeHtml(v.phone)}">${escapeHtml(v.phone)}</a>` : "-"}</td>
            <td>${escapeHtml(v.notes) || "-"}</td>
            <td>
                <button class="btn btn-sm" onclick="editVendor(${v.id}, '${escapeHtml(v.name)}', '${escapeHtml(v.category || "")}', '${escapeHtml(v.contact_person || "")}', '${escapeHtml(v.phone || "")}', '${escapeHtml(v.notes || "")}')">수정</button>
                <button class="btn btn-sm btn-danger" onclick="deleteVendor(${v.id})">삭제</button>
            </td>
        </tr>
    `).join("");
}

async function editVendor(id, curName, curCategory, curContact, curPhone, curNotes) {
    const name = prompt("업체명", curName);
    if (name === null) return;
    const category = prompt("분야", curCategory);
    if (category === null) return;
    const contact = prompt("담당자", curContact);
    if (contact === null) return;
    const phone = prompt("연락처", curPhone);
    if (phone === null) return;
    const notes = prompt("비고", curNotes);
    if (notes === null) return;

    const { error } = await sb.from("vendors").update({
        name: name.trim(), category: category.trim(), contact_person: contact.trim(),
        phone: phone.trim(), notes: notes.trim(),
    }).eq("id", id);
    if (error) { alert(error.message); return; }
    await loadList();
}

async function deleteVendor(id) {
    if (!confirm("삭제하시겠습니까?")) return;
    const { error } = await sb.from("vendors").update({ is_active: false }).eq("id", id);
    if (error) { alert(error.message); return; }
    await loadList();
}
</script>
</body>
</html>
